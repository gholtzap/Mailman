version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: paper-reader-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: paper-reader
    volumes:
      - mongodb_data:/data/db
    networks:
      - paper-reader

  redis:
    image: redis:7-alpine
    container_name: paper-reader-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - paper-reader

volumes:
  mongodb_data:
  redis_data:

networks:
  paper-reader:
    driver: bridge
